<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUSANTARA-GO - Platform E-Commerce Terpadu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #f59e0b;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: var(--text-main);
            min-height: 100vh;
        }

        header {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn-cart {
            background: var(--primary);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s;
            backdrop-filter: blur(10px);
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .product-img {
            height: 160px;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 40px;
        }

        .product-body {
            padding: 16px;
        }

        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 15px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .btn-buy {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-buy:hover {
            opacity: 0.9;
        }

        /* Modal Cart / Checkout */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .checkout-total {
            margin: 20px 0;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        .btn-checkout {
            width: 100%;
            padding: 12px;
            background: #10b981;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-boxes-stacked"></i> NUSANTARA-GO</div>
        <div class="nav-actions">
            <button class="btn-cart" onclick="toggleCart()"><i class="fa-solid fa-cart-shopping"></i> Keranjang (<span id="cart-count">0</span>)</button>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <h1>Katalog Produk Nusantara</h1>
            <p>Sistem E-Commerce Terpadu dengan Manajemen Stok, Diskon, & Logistik Otomatis</p>
        </div>

        <div class="product-grid" id="product-grid">
            <!-- Produk akan dimuat secara dinamis lewat JS -->
        </div>
    </div>

    <!-- MODAL KERANJANG -->
    <div class="modal" id="cart-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Keranjang Belanja Anda</h3>
                <button class="close-btn" onclick="toggleCart()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="cart-items-container" style="max-height: 200px; overflow-y: auto;">
                <!-- List item keranjang -->
            </div>
            <div class="checkout-total">
                <span>Total:</span>
                <span id="cart-total" style="color: var(--accent);">Rp 0</span>
            </div>
            <button class="btn-checkout" onclick="proceedCheckout()">Checkout & Pembayaran</button>
        </div>
    </div>

    <script>
        // Data Produk Contoh (Manajemen Produk)
        const products = [
            { id: 1, name: "Kopi Arabika Gayo Premium", price: 75000, stock: 45, icon: "fa-mug-hot" },
            { id: 2, name: "Kain Tenun Ikat Tradisional", price: 250000, stock: 12, icon: "fa-shirt" },
            { id: 3, name: "Minyak Kayu Putih Ambon Asli", price: 45000, stock: 100, icon: "fa-bottle-droplet" },
            { id: 4, name: "Keripik Tempe Sagu Malang", price: 25000, stock: 80, icon: "fa-cookie" }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="product-img"><i class="fa-solid ${p.icon}"></i></div>
                        <div class="product-body">
                            <div class="product-title">${p.name}</div>
                            <div class="product-price">Rp ${p.toLocaleString('id-ID')}</div>
                            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px;">Stok Tersedia: ${p.stock}</div>
                            <button class="btn-buy" onclick="addToCart(${p.id})"><i class="fa-solid fa-cart-plus"></i> + Keranjang</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (product.stock <= 0) {
                alert("Maaf, stok produk habis!");
                return;
            }
            
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCartUI();
            alert(`Berhasil menambahkan ${product.name} ke keranjang!`);
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
            
            const container = document.getElementById('cart-items-container');
            container.innerHTML = '';
            
            let total = 0;
            if (cart.length === 0) {
                container.innerHTML = `<p style="text-align: center; color: var(--text-muted); padding: 20px;">Keranjang masih kosong.</p>";`;
            } else {
                cart.forEach(item => {
                    total += item.price * item.qty;
                    container.innerHTML += `
                        <div class="cart-item">
                            <div>
                                <strong>${item.name}</strong><br>
                                <small>${item.qty}x @ Rp ${item.price.toLocaleString('id-ID')}</small>
                            </div>
                            <div>Rp ${(item.price * item.qty).toLocaleString('id-ID')}</div>
                        </div>
                    `;
                });
            }
            document.getElementById('cart-total').innerText = "Rp " + total.toLocaleString('id-ID');
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        function proceedCheckout() {
            if (cart.length === 0) {
                alert("Keranjang masih kosong!");
                return;
            }
            alert("Simulasi Transaksi Berhasil! Menuju ke Payment Gateway & Logistik Resi...");
            cart = [];
            updateCartUI();
            toggleCart();
        }

        // Inisialisasi awal
        renderProducts();
    </script>
</body>
</html>
